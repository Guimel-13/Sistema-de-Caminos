<header class="flex justify-between items-center mb-6 bg-darkcard p-4 rounded-2xl border border-slate-800/50 w-full">
    <div class="flex items-center gap-3 bg-[#0B1120] px-4 py-2 rounded-xl border border-slate-700">
        <i class="fas fa-calendar-alt text-accent"></i>
        <span class="text-xs font-bold text-slate-400 uppercase tracking-widest">Gestión Activa:</span>
        <input type="number" id="gestionGlobal" onchange="cambiarGestion()" onkeyup="if(this.value.length === 4) cambiarGestion()" value="2024" class="bg-transparent text-accent font-black text-lg outline-none w-16 text-center border-b border-transparent focus:border-accent transition-colors placeholder-slate-600" placeholder="Año">
    </div>

    <div class="bg-[#0B1120] border border-slate-700 rounded-full px-4 py-2 flex items-center w-1/3">
        <i class="fas fa-search text-slate-500 mr-3"></i>
        <input type="text" placeholder="Buscar por detalle, preventivo o folio..." class="bg-transparent border-none outline-none text-sm w-full text-slate-200">
    </div>

    <div class="flex items-center gap-3">
        <div class="text-right hidden md:block mr-2">
            <p class="text-white text-sm font-bold">Admin Caminos</p>
            <p class="text-[10px] text-emerald-400 uppercase font-bold tracking-wider">Conectado</p>
        </div>
        <img src="https://ui-avatars.com/api/?name=Admin+Caminos&background=A855F7&color=fff" class="w-10 h-10 rounded-full border-2 border-slate-700">
    </div>
</header>
