<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Caminos - Archivo Digital Pro</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"> 

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        darkbg: '#0B1120',      
                        darkcard: '#151C2C',    
                        accent: '#A855F7',      
                        accenthover: '#9333EA', 
                    }
                }
            }
        }
    </script>

    <link rel="stylesheet" href="css/styles.css">
</head>

<body class="bg-darkbg text-slate-300 h-screen overflow-hidden flex font-sans relative">

    <div id="caja-menu" class="h-full flex-shrink-0 z-20"></div>

    <main class="flex-1 flex flex-col h-full overflow-hidden p-6 relative">
        <div id="caja-header" class="flex-shrink-0"></div>

        <div id="caja-dashboard" class="h-full"></div>
        <div id="caja-tabla" class="h-full hidden"></div>
        
        <div id="caja-tabla_sip" class="h-full hidden"></div>

        <div id="caja-tabla_c21_cip" class="h-full hidden"></div>

    </main>

    <div id="caja-modal-registro"></div>
    <div id="caja-modal-visor"></div>
    
    <div id="caja-modal-registro-sip"></div>

    <div id="caja-modal-registro-c21-cip"></div>

    <script src="js/app.js"></script>
</body>
</html>
